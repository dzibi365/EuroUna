<!DOCTYPE html>
<html lang="bs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lista Sječenja Drveta</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #eef2ee;
      color: #222;
      padding: 20px;
      font-size: 14px;
    }

    /* ── Screen: App container ───────────────────────── */
    #app {
      max-width: 960px;
      margin: 0 auto;
      background: #fff;
      border-radius: 6px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.12);
      padding: 28px 32px 32px;
    }

    .section-title {
      font-size: 14px;
      font-weight: 700;
      color: #1e5c21;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 10px;
      margin-top: 18px;
      border-bottom: 2px solid #1e5c21;
      padding-bottom: 5px;
    }

    .inputs-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px 20px;
      margin-bottom: 6px;
    }

    .inputs-grid-2 {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px 20px;
      margin-bottom: 20px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .input-group label {
      font-size: 13px;
      font-weight: 700;
      color: #333;
      letter-spacing: 0.2px;
    }

    .input-group input {
      padding: 7px 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
      width: 100%;
      transition: border-color 0.15s;
    }

    .input-group input:focus {
      outline: none;
      border-color: #1e5c21;
      box-shadow: 0 0 0 2px rgba(30,92,33,0.15);
    }

    .input-group.main-input input {
      border: 2px solid #1e5c21;
      font-size: 17px;
      font-weight: 700;
      color: #1e5c21;
    }

    /* ── Buttons ─────────────────────────────────────── */
    .buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .btn {
      padding: 9px 20px;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }

    .btn:hover  { opacity: 0.88; }
    .btn:active { transform: scale(0.97); }

    .btn-calc  { background: #1e5c21; color: #fff; }
    .btn-regen { background: #4a8c4e; color: #fff; }
    .btn-clear { background: #c0392b; color: #fff; }
    .btn-csv   { background: #2471a3; color: #fff; }
    .btn-print { background: #7d3c98; color: #fff; }

    /* ── Screen table ────────────────────────────────── */
    .table-wrap { overflow-x: auto; margin-bottom: 18px; }

    table { width: 100%; border-collapse: collapse; font-size: 13.5px; }

    thead tr th {
      background: #1e5c21;
      color: #fff;
      padding: 10px 14px;
      text-align: center;
      font-size: 12px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    tbody tr:nth-child(even) td { background: #f4f8f4; }
    tbody tr:hover td { background: #e2efe3; }
    tbody td { padding: 7px 14px; text-align: center; border-bottom: 1px solid #e8e8e8; }

    /* ── Screen summary ──────────────────────────────── */
    .summary {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      background: #f4f8f4;
      border: 1px solid #b5d5b7;
      border-radius: 5px;
      padding: 14px 18px;
    }

    .summary-item { text-align: center; }
    .summary-item .s-label { font-size: 10px; text-transform: uppercase; color: #666; letter-spacing: 0.5px; margin-bottom: 4px; }
    .summary-item .s-value { font-size: 20px; font-weight: 700; color: #1e5c21; }
    .summary-item.diff-ok  .s-value { color: #1e8c26; }
    .summary-item.diff-bad .s-value { color: #c0392b; }

    .empty-state {
      text-align: center;
      color: #999;
      padding: 44px 20px;
      font-style: italic;
      font-size: 15px;
    }

    /* ── Print view (hidden on screen) ──────────────── */
    #print-view { display: none; }

    /* ══════════════════════════════════════════════════
       PRINT STYLES — matches the physical template
       ══════════════════════════════════════════════════ */
    @media print {
      @page { size: A4 portrait; margin: 12mm 10mm; }

      body { background: #fff; padding: 0; font-size: 11px; }

      #app        { display: none !important; }
      #print-view { display: block !important; }

      .ph-company {
        font-size: 12px;
        font-weight: 700;
        margin-bottom: 1px;
      }

      .ph-title {
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.5px;
        margin-bottom: 6px;
      }

      .ph-meta {
        font-size: 10px;
        margin-bottom: 2px;
      }

      .ph-meta span { font-weight: 700; }

      .print-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 9.5px;
        margin-top: 8px;
        margin-bottom: 6px;
      }

      .print-table th {
        background: #fff;
        border: 1px solid #333;
        padding: 3px 5px;
        text-align: center;
        font-size: 9px;
        font-weight: 700;
      }

      .print-table td {
        border: 1px solid #555;
        padding: 2px 4px;
        text-align: center;
        height: 14px;
        white-space: nowrap;
      }

      .print-table .divider {
        border-left: 2px solid #000;
      }

      .print-table tr.subtotal-row td {
        border-top: 2px solid #000;
        font-weight: 700;
        background: #f0f0f0;
      }

      .print-summary {
        font-size: 11px;
        margin-top: 6px;
        display: flex;
        gap: 40px;
      }

      .print-summary span { font-weight: 700; }
    }

    @media (max-width: 600px) {
      .inputs-grid, .inputs-grid-2 { grid-template-columns: 1fr 1fr; }
      .summary { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<!-- ══════════════════════════════════════════════
     SCREEN APP
     ══════════════════════════════════════════════ -->
<div id="app">
  <input type="hidden" id="datum">
  <div class="section-title">Informacije o dokumentu</div>
  <div class="inputs-grid-2">
    <div class="input-group">
      <label>Vrsta drveta</label>
      <input type="text" id="vrstaDrveta" placeholder="npr. Bukva" value="Bukva">
    </div>
    <div class="input-group">
      <label>Rukovodilac stroja</label>
      <input type="text" id="rukovodilac" placeholder="Ime i prezime">
    </div>
  </div>

  <div class="section-title">Parametri izračuna</div>
  <div class="inputs-grid">
    <div class="input-group main-input">
      <label>Ciljni ukupni volumen (m³)</label>
      <input type="text" id="targetVolume" value="25,943" placeholder="npr. 25,943">
    </div>
    <div class="input-group">
      <label>Min dužina (m)</label>
      <input type="number" id="minLength" value="2.0" step="0.1" min="0.1">
    </div>
    <div class="input-group">
      <label>Max dužina (m)</label>
      <input type="number" id="maxLength" value="4.8" step="0.1" min="0.1">
    </div>
    <div class="input-group">
      <label>Min Fi (cm)</label>
      <input type="number" id="minFi" value="20" step="1" min="1">
    </div>
    <div class="input-group">
      <label>Max Fi (cm)</label>
      <input type="number" id="maxFi" value="80" step="1" min="1">
    </div>
    <div class="input-group">
      <label>Tolerancija (m³)</label>
      <input type="number" id="tolerance" value="0.01" step="0.001" min="0">
    </div>
    <div class="input-group">
      <label>Korak dužine (m)</label>
      <input type="number" id="lengthStep" value="0.1" step="0.01" min="0.01">
    </div>
    <div class="input-group">
      <label>Maks. komada (opcionalno)</label>
      <input type="number" id="maxPieces" placeholder="Bez ograničenja" min="1">
    </div>
    <div class="input-group">
      <label>Fiksno komada (opcionalno)</label>
      <input type="number" id="fixedPieces" placeholder="Automatski" min="1">
    </div>
  </div>

  <div class="buttons">
    <button class="btn btn-calc"  onclick="calculate()">Izračunaj</button>
    <button class="btn btn-regen" onclick="calculate()">Regeneriraj</button>
    <button class="btn btn-clear" onclick="clearAll()">Obriši</button>
    <button class="btn btn-csv"   onclick="exportCSV()">Izvezi CSV</button>
    <button class="btn btn-print" onclick="printPDF()">Štampaj / Izvezi PDF</button>
  </div>

  <div id="output">
    <div class="empty-state">Unesite ciljni volumen i kliknite <strong>Izračunaj</strong> za generiranje liste sječenja.</div>
  </div>
</div>

<!-- ══════════════════════════════════════════════
     PRINT VIEW — hidden on screen, shown on print
     Matches the "DNEVNI LIST PROREZA OBLOVINE" template:
       40 rows on the left column, 40 rows on the right.
     ══════════════════════════════════════════════ -->
<div id="print-view">
  <div class="ph-company">Euro Una d.o.o.</div>
  <div class="ph-title">DNEVNI LIST PROREZA OBLOVINE</div>
  <div class="ph-meta">Datum: <span id="p-datum"></span></div>
  <div class="ph-meta">Vrsta drveta: <span id="p-vrsta"></span></div>
  <div class="ph-meta">Rukovodilac stroja: <span id="p-ruko"></span></div>

  <table class="print-table">
    <thead>
      <tr>
        <th>RB</th>
        <th>Du&#382;ina</th>
        <th>&#216;</th>
        <th>m&#179;</th>
        <th class="divider">RB</th>
        <th>Du&#382;ina</th>
        <th>&#216;</th>
        <th>m&#179;</th>
      </tr>
    </thead>
    <tbody id="print-tbody"></tbody>
  </table>

  <div class="print-summary">
    <div>Ukupno m&#179;: <span id="p-total"></span></div>
    <div>Broj komada: <span id="p-count"></span></div>
  </div>
</div>

<script>
/* ================================================================
   Wood Cutting List Calculator
   ================================================================
   Volume formula (cylindrical log):
     V = L × π × (d / 100)² / 4
   where L = length in metres, d = diameter in centimetres.

   Matching algorithm:
     Run MAX_ATTEMPTS random trials; keep the result closest to target.
     Each trial:
       1. Pick piece count n (fixed or estimated from avg vol ±30%).
       2. Generate n−1 random valid (length, fi) pieces.
       3. Analytically solve the best last piece:
            for each integer fi, compute L_ideal = V_remaining × 4 / (π × (fi/100)²)
            clamp to [minLen, maxLen], snap to lenStep, record error.
       4. Keep the trial if it beats the current best.
       5. Stop early if within tolerance.

   Print layout:
     Matches the physical "DNEVNI LIST PROREZA OBLOVINE" template.
     ROWS_PER_COL rows on the left (pieces 1–40) and
     ROWS_PER_COL rows on the right (pieces 41–80).
     Empty slots show 0,000 in the m³ cell.
   ================================================================ */

  const ROWS_PER_COL = 40;

  let currentPieces = [];

  /* ── Default today's date ────────────────────────────────────── */
  (function () {
    const t  = new Date();
    const mm = String(t.getMonth() + 1).padStart(2, '0');
    const dd = String(t.getDate()).padStart(2, '0');
    document.getElementById('datum').value = `${t.getFullYear()}-${mm}-${dd}`;
  })();

  /* ── Parsing ─────────────────────────────────────────────────── */

  function parseEU(str) {
    if (typeof str === 'number') return str;
    str = String(str).trim();
    const dotPos   = str.lastIndexOf('.');
    const commaPos = str.lastIndexOf(',');
    if (commaPos > dotPos) {
      return parseFloat(str.replace(/\./g, '').replace(',', '.'));
    }
    return parseFloat(str.replace(/,/g, ''));
  }

  /* ── Formatting ──────────────────────────────────────────────── */

  function fmtEU(val, dec = 3) {
    return val.toFixed(dec).replace('.', ',');
  }

  function fmtDate(iso) {
    if (!iso) return '';
    const [y, m, d] = iso.split('-');
    return `${d}.${m}.${y}.`;
  }

  /* ── Volume formula ──────────────────────────────────────────── */

  function calcVol(lengthM, diameterCm) {
    return lengthM * Math.PI * Math.pow(diameterCm / 100, 2) / 4;
  }

  /* ── Random helpers ──────────────────────────────────────────── */

  function rndInt(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
  }

  function rndSnap(min, max, step) {
    const steps = Math.floor((max - min) / step + 1e-9);
    const idx   = Math.floor(Math.random() * (steps + 1));
    return Math.min(max, parseFloat((min + idx * step).toFixed(10)));
  }

  function snap(val, min, max, step) {
    const s = Math.round((val - min) / step) * step + min;
    return Math.min(max, Math.max(min, parseFloat(s.toFixed(10))));
  }

  /* ── Best single-piece finder ────────────────────────────────── */

  function findBestPiece(targetVol, minLen, maxLen, minFi, maxFi, lenStep) {
    let best    = null;
    let bestErr = Infinity;

    for (let fi = minFi; fi <= maxFi; fi++) {
      const area     = Math.PI * Math.pow(fi / 100, 2) / 4;
      const idealLen = targetVol / area;
      const clamped  = Math.min(maxLen, Math.max(minLen, idealLen));
      const snapped  = snap(clamped, minLen, maxLen, lenStep);

      for (const len of [
        snapped,
        snap(snapped + lenStep, minLen, maxLen, lenStep),
        snap(snapped - lenStep, minLen, maxLen, lenStep),
      ]) {
        const vol = calcVol(len, fi);
        const err = Math.abs(vol - targetVol);
        if (err < bestErr) { bestErr = err; best = { length: len, fi, volume: vol }; }
      }
    }
    return best;
  }

  /* ── Main generation algorithm ───────────────────────────────── */

  function generatePieces(target, minLen, maxLen, minFi, maxFi,
                           tolerance, maxPieces, fixedPieces, lenStep) {
    const MAX_ATTEMPTS = 800;
    const avgVol = calcVol((minLen + maxLen) / 2, (minFi + maxFi) / 2);

    let best    = null;
    let bestErr = Infinity;

    for (let attempt = 0; attempt < MAX_ATTEMPTS; attempt++) {
      const pieces = [];
      let total    = 0;

      let n;
      if (fixedPieces) {
        n = fixedPieces;
      } else {
        const est = Math.max(1, Math.round(target / avgVol));
        n = Math.max(1, est + Math.round((Math.random() - 0.5) * est * 0.6));
        if (maxPieces) n = Math.min(n, maxPieces);
      }

      for (let i = 0; i < n - 1; i++) {
        const len = rndSnap(minLen, maxLen, lenStep);
        const fi  = rndInt(minFi, maxFi);
        const vol = calcVol(len, fi);
        if (total + vol > target * 1.5) continue;
        pieces.push({ length: len, fi, volume: vol });
        total += vol;
      }

      const remaining = target - total;
      if (remaining > 1e-9) {
        const last = findBestPiece(remaining, minLen, maxLen, minFi, maxFi, lenStep);
        if (last) { pieces.push(last); total += last.volume; }
      }

      if (maxPieces && pieces.length > maxPieces) continue;
      if (pieces.length === 0) continue;

      const err = Math.abs(total - target);
      if (err < bestErr) {
        bestErr = err;
        best    = { pieces: pieces.slice(), total };
        if (err <= tolerance) break;
      }
    }
    return best;
  }

  /* ── Input reading ───────────────────────────────────────────── */

  function getInputs() {
    const target     = parseEU(document.getElementById('targetVolume').value);
    const minLen     = parseFloat(document.getElementById('minLength').value);
    const maxLen     = parseFloat(document.getElementById('maxLength').value);
    const minFi      = parseInt(document.getElementById('minFi').value, 10);
    const maxFi      = parseInt(document.getElementById('maxFi').value, 10);
    const tolerance  = parseFloat(document.getElementById('tolerance').value) || 0.01;
    const lenStep    = parseFloat(document.getElementById('lengthStep').value) || 0.1;
    const maxPiecesV = document.getElementById('maxPieces').value;
    const fixedPcsV  = document.getElementById('fixedPieces').value;

    if (isNaN(target) || target <= 0)
      { alert('Unesite ispravan ciljni volumen (m³).'); return null; }
    if (isNaN(minLen) || isNaN(maxLen) || minLen <= 0 || minLen > maxLen)
      { alert('Neispravne vrijednosti min/max dužine.'); return null; }
    if (isNaN(minFi) || isNaN(maxFi) || minFi <= 0 || minFi > maxFi)
      { alert('Neispravne vrijednosti min/max Fi.'); return null; }

    return {
      target, minLen, maxLen, minFi, maxFi, tolerance, lenStep,
      maxPieces:   maxPiecesV ? parseInt(maxPiecesV, 10) : null,
      fixedPieces: fixedPcsV  ? parseInt(fixedPcsV,  10) : null,
    };
  }

  /* ── Screen render ───────────────────────────────────────────── */

  function renderScreen(pieces, total, target, toleranceVal) {
    const diff      = total - target;
    const ok        = Math.abs(diff) <= toleranceVal;
    const sign      = diff >= 0 ? '+' : '';
    const diffClass = ok ? 'diff-ok' : 'diff-bad';

    let rows = '';
    pieces.forEach((p, i) => {
      rows += `<tr>
        <td>${i + 1}</td>
        <td>${fmtEU(p.length, 1)}</td>
        <td>${p.fi}</td>
        <td>${fmtEU(p.volume, 3)}</td>
      </tr>`;
    });

    document.getElementById('output').innerHTML = `
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>RB</th><th>Dužina (m)</th><th>Fi (cm)</th><th>m³</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
      <div class="summary">
        <div class="summary-item">
          <div class="s-label">Ukupno m³</div>
          <div class="s-value">${fmtEU(total, 3)}</div>
        </div>
        <div class="summary-item">
          <div class="s-label">Ciljni m³</div>
          <div class="s-value">${fmtEU(target, 3)}</div>
        </div>
        <div class="summary-item ${diffClass}">
          <div class="s-label">Razlika</div>
          <div class="s-value">${sign}${fmtEU(diff, 3)}</div>
        </div>
        <div class="summary-item">
          <div class="s-label">Komada</div>
          <div class="s-value">${pieces.length}</div>
        </div>
      </div>`;
  }

  /* ── Print view render ───────────────────────────────────────── */

  function renderPrint(pieces, total) {
    const leftPieces  = pieces.slice(0, ROWS_PER_COL);
    const rightPieces = pieces.slice(ROWS_PER_COL, ROWS_PER_COL * 2);

    let leftTotal  = 0;
    let rightTotal = 0;
    let rows       = '';

    for (let i = 0; i < ROWS_PER_COL; i++) {
      const L = leftPieces[i]  || null;
      const R = rightPieces[i] || null;

      if (L) leftTotal  += L.volume;
      if (R) rightTotal += R.volume;

      rows += `<tr>
        <td>${i + 1}.</td>
        <td>${L ? fmtEU(L.length, 1) : ''}</td>
        <td>${L ? L.fi : ''}</td>
        <td>${L ? fmtEU(L.volume, 3) : '0,000'}</td>
        <td class="divider">${ROWS_PER_COL + i + 1}.</td>
        <td>${R ? fmtEU(R.length, 1) : ''}</td>
        <td>${R ? R.fi : ''}</td>
        <td>${R ? fmtEU(R.volume, 3) : '0,000'}</td>
      </tr>`;
    }

    rows += `<tr class="subtotal-row">
      <td colspan="3"></td>
      <td>${fmtEU(leftTotal, 3)}</td>
      <td class="divider" colspan="3"></td>
      <td>${fmtEU(rightTotal, 3)}</td>
    </tr>`;

    document.getElementById('print-tbody').innerHTML = rows;
    document.getElementById('p-total').textContent  = fmtEU(total, 3);
    document.getElementById('p-count').textContent  = pieces.length;
    document.getElementById('p-datum').textContent  = fmtDate(document.getElementById('datum').value);
    document.getElementById('p-vrsta').textContent  = document.getElementById('vrstaDrveta').value;
    document.getElementById('p-ruko').textContent   = document.getElementById('rukovodilac').value;
  }

  /* ── Button handlers ─────────────────────────────────────────── */

  function calculate() {
    const cfg = getInputs();
    if (!cfg) return;

    document.getElementById('output').innerHTML =
      '<div class="empty-state">Izračunavanje&hellip;</div>';

    setTimeout(() => {
      const result = generatePieces(
        cfg.target, cfg.minLen, cfg.maxLen, cfg.minFi, cfg.maxFi,
        cfg.tolerance, cfg.maxPieces, cfg.fixedPieces, cfg.lenStep
      );

      if (!result || result.pieces.length === 0) {
        document.getElementById('output').innerHTML =
          '<div class="empty-state">Nije moguće generirati listu sječenja. Provjerite unešene vrijednosti.</div>';
        currentPieces = [];
        return;
      }

      currentPieces = result.pieces;
      renderScreen(result.pieces, result.total, cfg.target, cfg.tolerance);
      renderPrint(result.pieces, result.total);
    }, 30);
  }

  function clearAll() {
    currentPieces = [];
    document.getElementById('targetVolume').value = '';
    document.getElementById('output').innerHTML =
      '<div class="empty-state">Unesite ciljni volumen i kliknite <strong>Izračunaj</strong> za generiranje liste sječenja.</div>';
  }

  /* ── CSV export ──────────────────────────────────────────────── */

  function exportCSV() {
    if (currentPieces.length === 0) {
      alert('Nema podataka za izvoz. Molimo prvo izračunajte.'); return;
    }

    const cfg    = getInputs();
    const target = cfg ? cfg.target : 0;
    const total  = currentPieces.reduce((s, p) => s + p.volume, 0);
    const diff   = total - target;

    let csv = `Euro Una d.o.o.\nDNEVNI LIST PROREZA OBLOVINE\n`;
    csv += `Datum;${fmtDate(document.getElementById('datum').value)}\n`;
    csv += `Vrsta drveta;${document.getElementById('vrstaDrveta').value}\n`;
    csv += `Rukovodilac stroja;${document.getElementById('rukovodilac').value}\n\n`;
    csv += 'RB;Duzina (m);Fi (cm);m3\n';

    currentPieces.forEach((p, i) => {
      csv += `${i + 1};${fmtEU(p.length, 1)};${p.fi};${fmtEU(p.volume, 3)}\n`;
    });

    csv += `\nUkupno m3;;;${fmtEU(total, 3)}\n`;
    csv += `Ciljni m3;;;${fmtEU(target, 3)}\n`;
    csv += `Razlika;;;${(diff >= 0 ? '+' : '') + fmtEU(diff, 3)}\n`;
    csv += `Broj komada;;;${currentPieces.length}\n`;

    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = 'lista_sjecenja.csv';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  /* ── Print / PDF ─────────────────────────────────────────────── */

  function printPDF() {
    if (currentPieces.length === 0) {
      alert('Nema podataka za štampanje. Molimo prvo izračunajte.'); return;
    }
    window.print();
  }
</script>
</body>
</html>
