<!DOCTYPE html>
<html lang="bs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lista Sječenja Drveta</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #eef2ee;
      color: #222;
      padding: 20px;
      font-size: 14px;
    }

    .container {
      max-width: 920px;
      margin: 0 auto;
      background: #fff;
      border-radius: 6px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.12);
      padding: 28px 32px 32px;
    }

    h1 {
      text-align: center;
      font-size: 22px;
      color: #1e5c21;
      border-bottom: 3px solid #1e5c21;
      padding-bottom: 12px;
      margin-bottom: 22px;
      letter-spacing: 0.5px;
    }

    /* ── Inputs ─────────────────────────────────── */
    .inputs-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px 20px;
      margin-bottom: 20px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .input-group label {
      font-size: 11px;
      font-weight: 700;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .input-group input {
      padding: 7px 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
      width: 100%;
      transition: border-color 0.15s;
    }

    .input-group input:focus {
      outline: none;
      border-color: #1e5c21;
      box-shadow: 0 0 0 2px rgba(30,92,33,0.15);
    }

    .input-group.main-input input {
      border: 2px solid #1e5c21;
      font-size: 17px;
      font-weight: 700;
      color: #1e5c21;
    }

    /* ── Buttons ─────────────────────────────────── */
    .buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .btn {
      padding: 9px 20px;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }

    .btn:hover  { opacity: 0.88; }
    .btn:active { transform: scale(0.97); }

    .btn-calc    { background: #1e5c21; color: #fff; }
    .btn-regen   { background: #4a8c4e; color: #fff; }
    .btn-clear   { background: #c0392b; color: #fff; }
    .btn-csv     { background: #2471a3; color: #fff; }
    .btn-print   { background: #7d3c98; color: #fff; }

    /* ── Table ───────────────────────────────────── */
    .table-wrap {
      overflow-x: auto;
      margin-bottom: 18px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13.5px;
    }

    thead tr th {
      background: #1e5c21;
      color: #fff;
      padding: 10px 14px;
      text-align: center;
      font-size: 12px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    tbody tr:nth-child(even) td { background: #f4f8f4; }

    tbody tr:hover td { background: #e2efe3; }

    tbody td {
      padding: 7px 14px;
      text-align: center;
      border-bottom: 1px solid #e8e8e8;
    }

    /* ── Summary ─────────────────────────────────── */
    .summary {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      background: #f4f8f4;
      border: 1px solid #b5d5b7;
      border-radius: 5px;
      padding: 14px 18px;
    }

    .summary-item { text-align: center; }

    .summary-item .s-label {
      font-size: 10px;
      text-transform: uppercase;
      color: #666;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .summary-item .s-value {
      font-size: 20px;
      font-weight: 700;
      color: #1e5c21;
    }

    .summary-item.diff-ok  .s-value { color: #1e8c26; }
    .summary-item.diff-bad .s-value { color: #c0392b; }

    /* ── Empty / error state ─────────────────────── */
    .empty-state {
      text-align: center;
      color: #999;
      padding: 44px 20px;
      font-style: italic;
      font-size: 15px;
    }

    /* ── Print ───────────────────────────────────── */
    @media print {
      body { background: #fff; padding: 0; }
      .container { box-shadow: none; padding: 10px; }
      .buttons, .inputs-grid { display: none !important; }
      h1 { font-size: 18px; }
      .summary { border: 1px solid #999; }
    }

    @media (max-width: 600px) {
      .inputs-grid { grid-template-columns: 1fr 1fr; }
      .summary { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
<div class="container" id="app">
  <h1>Kalkulator Liste Sječenja Drveta</h1>

  <div class="inputs-grid">
    <div class="input-group main-input">
      <label>Ciljni ukupni volumen (m³)</label>
      <input type="text" id="targetVolume" value="25,943" placeholder="npr. 25,943">
    </div>

    <div class="input-group">
      <label>Min dužina (m)</label>
      <input type="number" id="minLength" value="2.0" step="0.1" min="0.1">
    </div>

    <div class="input-group">
      <label>Max dužina (m)</label>
      <input type="number" id="maxLength" value="4.8" step="0.1" min="0.1">
    </div>

    <div class="input-group">
      <label>Min Fi (cm)</label>
      <input type="number" id="minFi" value="20" step="1" min="1">
    </div>

    <div class="input-group">
      <label>Max Fi (cm)</label>
      <input type="number" id="maxFi" value="80" step="1" min="1">
    </div>

    <div class="input-group">
      <label>Tolerancija (m³)</label>
      <input type="number" id="tolerance" value="0.01" step="0.001" min="0">
    </div>

    <div class="input-group">
      <label>Korak dužine (m)</label>
      <input type="number" id="lengthStep" value="0.1" step="0.01" min="0.01">
    </div>

    <div class="input-group">
      <label>Maks. komada (opcionalno)</label>
      <input type="number" id="maxPieces" placeholder="Bez ograničenja" min="1">
    </div>

    <div class="input-group">
      <label>Fiksno komada (opcionalno)</label>
      <input type="number" id="fixedPieces" placeholder="Automatski" min="1">
    </div>
  </div>

  <div class="buttons">
    <button class="btn btn-calc"  onclick="calculate()">Izračunaj</button>
    <button class="btn btn-regen" onclick="calculate()">Regeneriraj</button>
    <button class="btn btn-clear" onclick="clearAll()">Obriši</button>
    <button class="btn btn-csv"   onclick="exportCSV()">Izvezi CSV</button>
    <button class="btn btn-print" onclick="printPDF()">Štampaj / Izvezi PDF</button>
  </div>

  <div id="output">
    <div class="empty-state">Unesite ciljni volumen i kliknite <strong>Izračunaj</strong> za generiranje liste sječenja.</div>
  </div>
</div>

<script>
/* ================================================================
   Wood Cutting List Calculator
   ================================================================
   Volume formula (cylindrical log):
     V = L × π × (d / 100)² / 4
   where L = length in metres, d = diameter in centimetres.

   Matching algorithm:
     We run up to MAX_ATTEMPTS independent trials and keep the result
     whose total volume is closest to the target.

     Each trial:
       1. Decide how many pieces to generate.
          – If fixedPieces is set: use exactly that count.
          – Otherwise: estimate from (target / average-piece-vol) ±30%.
       2. Generate (n − 1) pieces with random valid (length, fi) pairs.
       3. Analytically find the single best last piece for the remaining
          volume by iterating every valid fi value, computing the ideal
          length, clamping it to [minLen, maxLen], and snapping to the
          length step.  Pick whichever (fi, len) pair gives smallest
          absolute error.
       4. Record total and compare against the current best.
       5. Stop early if we are within tolerance.
   ================================================================ */

  let currentPieces = [];   // last calculated result, used by export / print

  /* ── Parsing ─────────────────────────────────────────────────── */

  /**
   * Accept both "25.943" (dot) and "25,943" (comma) as decimal separator.
   * When both symbols appear, the rightmost one is the decimal separator.
   */
  function parseEU(str) {
    if (typeof str === 'number') return str;
    str = String(str).trim();
    const dotPos   = str.lastIndexOf('.');
    const commaPos = str.lastIndexOf(',');
    if (commaPos > dotPos) {
      // comma is decimal: strip any dots used as thousand-separators
      return parseFloat(str.replace(/\./g, '').replace(',', '.'));
    }
    // dot is decimal (or no separator): strip any commas used as thousand-separators
    return parseFloat(str.replace(/,/g, ''));
  }

  /* ── Formatting ──────────────────────────────────────────────── */

  /** Format with European decimal comma, fixed decimals. */
  function fmtEU(val, dec = 3) {
    return val.toFixed(dec).replace('.', ',');
  }

  /* ── Core volume formula ─────────────────────────────────────── */

  /**
   * Volume of a cylindrical log.
   * @param {number} lengthM    – length in metres
   * @param {number} diameterCm – diameter in centimetres
   * @returns {number} volume in m³
   */
  function calcVol(lengthM, diameterCm) {
    return lengthM * Math.PI * Math.pow(diameterCm / 100, 2) / 4;
  }

  /* ── Random helpers ──────────────────────────────────────────── */

  /** Random integer in [min, max] inclusive. */
  function rndInt(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
  }

  /**
   * Random value snapped to the nearest multiple of `step` within [min, max].
   */
  function rndSnap(min, max, step) {
    const steps = Math.floor((max - min) / step + 1e-9);
    const idx   = Math.floor(Math.random() * (steps + 1));
    return Math.min(max, parseFloat((min + idx * step).toFixed(10)));
  }

  /** Snap a value to the nearest multiple of step, clamped to [min, max]. */
  function snap(val, min, max, step) {
    const snapped = Math.round((val - min) / step) * step + min;
    return Math.min(max, Math.max(min, parseFloat(snapped.toFixed(10))));
  }

  /* ── Best single-piece finder ────────────────────────────────── */

  /**
   * Find the (length, fi) combination that produces a volume closest
   * to `targetVol`, within the supplied constraints.
   *
   * For each integer fi value we analytically compute the ideal length:
   *   L_ideal = targetVol × 4 / (π × (fi/100)²)
   * then snap it to the length grid and record the error.
   *
   * @returns {{ length, fi, volume }} best piece, or null if impossible.
   */
  function findBestPiece(targetVol, minLen, maxLen, minFi, maxFi, lenStep) {
    let best = null;
    let bestErr = Infinity;

    for (let fi = minFi; fi <= maxFi; fi++) {
      const area     = Math.PI * Math.pow(fi / 100, 2) / 4; // m² cross-section
      const idealLen = targetVol / area;                      // ideal length for this fi

      // Clamp to valid range then snap to step
      const clamped  = Math.min(maxLen, Math.max(minLen, idealLen));
      const snapped  = snap(clamped, minLen, maxLen, lenStep);

      // Also check the adjacent step below and above (handles rounding edges)
      const candidates = [
        snapped,
        snap(snapped + lenStep, minLen, maxLen, lenStep),
        snap(snapped - lenStep, minLen, maxLen, lenStep),
      ];

      for (const len of candidates) {
        const vol = calcVol(len, fi);
        const err = Math.abs(vol - targetVol);
        if (err < bestErr) {
          bestErr = err;
          best    = { length: len, fi, volume: vol };
        }
      }
    }
    return best;
  }

  /* ── Main generation algorithm ───────────────────────────────── */

  /**
   * Run MAX_ATTEMPTS trials; return the pieces array whose total is
   * closest to `target` (stops early if within `tolerance`).
   */
  function generatePieces(target, minLen, maxLen, minFi, maxFi,
                           tolerance, maxPieces, fixedPieces, lenStep) {
    const MAX_ATTEMPTS = 800;

    // Reference volumes for sizing estimates
    const avgVol = calcVol((minLen + maxLen) / 2, (minFi + maxFi) / 2);

    let best    = null;
    let bestErr = Infinity;

    for (let attempt = 0; attempt < MAX_ATTEMPTS; attempt++) {
      const pieces = [];
      let total    = 0;

      // ── Decide how many pieces to target this trial ──
      let n;
      if (fixedPieces) {
        n = fixedPieces;
      } else {
        const est = Math.max(1, Math.round(target / avgVol));
        // ±30% variance so different trials explore different counts
        n = Math.max(1, est + Math.round((Math.random() - 0.5) * est * 0.6));
        if (maxPieces) n = Math.min(n, maxPieces);
      }

      // ── Generate n−1 random pieces ──
      for (let i = 0; i < n - 1; i++) {
        const len = rndSnap(minLen, maxLen, lenStep);
        const fi  = rndInt(minFi, maxFi);
        const vol = calcVol(len, fi);
        // Skip if this would push us far over target (avoid huge overshoot)
        if (total + vol > target * 1.5) continue;
        pieces.push({ length: len, fi, volume: vol });
        total += vol;
      }

      // ── Find the optimal last piece for the remaining volume ──
      const remaining = target - total;
      if (remaining > 1e-9) {
        const last = findBestPiece(remaining, minLen, maxLen, minFi, maxFi, lenStep);
        if (last) {
          pieces.push(last);
          total += last.volume;
        }
      }

      // Enforce maxPieces hard limit
      if (maxPieces && pieces.length > maxPieces) continue;
      if (pieces.length === 0) continue;

      const err = Math.abs(total - target);
      if (err < bestErr) {
        bestErr = err;
        best    = { pieces: pieces.slice(), total };
        if (err <= tolerance) break;   // good enough — stop early
      }
    }

    return best;
  }

  /* ── Input reading ───────────────────────────────────────────── */

  function getInputs() {
    const target     = parseEU(document.getElementById('targetVolume').value);
    const minLen     = parseFloat(document.getElementById('minLength').value);
    const maxLen     = parseFloat(document.getElementById('maxLength').value);
    const minFi      = parseInt(document.getElementById('minFi').value, 10);
    const maxFi      = parseInt(document.getElementById('maxFi').value, 10);
    const tolerance  = parseFloat(document.getElementById('tolerance').value) || 0.01;
    const lenStep    = parseFloat(document.getElementById('lengthStep').value) || 0.1;
    const maxPiecesV = document.getElementById('maxPieces').value;
    const fixedPcsV  = document.getElementById('fixedPieces').value;

    if (isNaN(target) || target <= 0) {
      alert('Unesite ispravan ciljni volumen (m³).'); return null;
    }
    if (isNaN(minLen) || isNaN(maxLen) || minLen <= 0 || minLen > maxLen) {
      alert('Neispravne vrijednosti min/max dužine.'); return null;
    }
    if (isNaN(minFi) || isNaN(maxFi) || minFi <= 0 || minFi > maxFi) {
      alert('Neispravne vrijednosti min/max Fi.'); return null;
    }

    return {
      target, minLen, maxLen, minFi, maxFi, tolerance, lenStep,
      maxPieces:   maxPiecesV  ? parseInt(maxPiecesV, 10)  : null,
      fixedPieces: fixedPcsV   ? parseInt(fixedPcsV, 10)   : null,
    };
  }

  /* ── Rendering ───────────────────────────────────────────────── */

  function renderResults(pieces, total, target, toleranceVal) {
    const diff    = total - target;
    const absDiff = Math.abs(diff);
    const ok      = absDiff <= toleranceVal;

    let rows = '';
    pieces.forEach((p, i) => {
      rows += `
        <tr>
          <td>${i + 1}</td>
          <td>${fmtEU(p.length, 1)}</td>
          <td>${p.fi}</td>
          <td>${fmtEU(p.volume, 3)}</td>
        </tr>`;
    });

    const diffClass = ok ? 'diff-ok' : 'diff-bad';
    const sign      = diff >= 0 ? '+' : '';

    document.getElementById('output').innerHTML = `
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>RB</th>
              <th>Dužina (m)</th>
              <th>Fi (cm)</th>
              <th>m³</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
      <div class="summary">
        <div class="summary-item">
          <div class="s-label">Ukupno m³</div>
          <div class="s-value">${fmtEU(total, 3)}</div>
        </div>
        <div class="summary-item">
          <div class="s-label">Ciljni m³</div>
          <div class="s-value">${fmtEU(target, 3)}</div>
        </div>
        <div class="summary-item ${diffClass}">
          <div class="s-label">Razlika</div>
          <div class="s-value">${sign}${fmtEU(diff, 3)}</div>
        </div>
        <div class="summary-item">
          <div class="s-label">Komada</div>
          <div class="s-value">${pieces.length}</div>
        </div>
      </div>`;
  }

  /* ── Button handlers ─────────────────────────────────────────── */

  function calculate() {
    const cfg = getInputs();
    if (!cfg) return;

    document.getElementById('output').innerHTML =
      '<div class="empty-state">Izračunavanje…</div>';

    // Defer so the browser can paint the "Calculating…" message first
    setTimeout(() => {
      const result = generatePieces(
        cfg.target, cfg.minLen, cfg.maxLen, cfg.minFi, cfg.maxFi,
        cfg.tolerance, cfg.maxPieces, cfg.fixedPieces, cfg.lenStep
      );

      if (!result || result.pieces.length === 0) {
        document.getElementById('output').innerHTML =
          '<div class="empty-state">Nije moguće generirati listu sječenja. Provjerite unešene vrijednosti.</div>';
        currentPieces = [];
        return;
      }

      currentPieces = result.pieces;
      renderResults(result.pieces, result.total, cfg.target, cfg.tolerance);
    }, 30);
  }

  function clearAll() {
    currentPieces = [];
    document.getElementById('targetVolume').value = '';
    document.getElementById('output').innerHTML =
      '<div class="empty-state">Unesite ciljni volumen i kliknite <strong>Izračunaj</strong> za generiranje liste sječenja.</div>';
  }

  /* ── CSV export ──────────────────────────────────────────────── */

  function exportCSV() {
    if (currentPieces.length === 0) {
      alert('Nema podataka za izvoz. Molimo prvo izračunajte.'); return;
    }
    const cfg    = getInputs();
    const target = cfg ? cfg.target : 0;
    const total  = currentPieces.reduce((s, p) => s + p.volume, 0);
    const diff   = total - target;

    let csv = 'RB;Dužina (m);Fi (cm);m3\n';
    currentPieces.forEach((p, i) => {
      csv += `${i + 1};${fmtEU(p.length, 1)};${p.fi};${fmtEU(p.volume, 3)}\n`;
    });
    csv += `\n;;;\n`;
    csv += `Ukupno;;;${fmtEU(total, 3)}\n`;
    csv += `Ciljni;;;${fmtEU(target, 3)}\n`;
    csv += `Razlika;;;${(diff >= 0 ? '+' : '') + fmtEU(diff, 3)}\n`;
    csv += `Komada;;;${currentPieces.length}\n`;

    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = 'lista_sjecenja.csv';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  /* ── Print / PDF ─────────────────────────────────────────────── */

  function printPDF() {
    if (currentPieces.length === 0) {
      alert('Nema podataka za štampanje. Molimo prvo izračunajte.'); return;
    }
    window.print();
  }
</script>
</body>
</html>
